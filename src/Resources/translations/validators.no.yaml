setono_sylius_qr_code:
    qr_code:
        name:
            not_blank: Name cannot be blank.
            too_long: Name cannot be longer than 255 characters.
        slug:
            not_blank: Slug cannot be blank.
            too_long: Slug cannot be longer than 100 characters.
            invalid_format: Slug may only contain lowercase letters, digits, and hyphens.
        slug_not_unique: Another QR code already uses this slug.
        error_correction_level:
            invalid: Invalid error correction level; allowed values are L, M, Q, H.
    product_related_qr_code:
        product:
            not_null: Please select a product.
    target_url_qr_code:
        target_url:
            not_blank: Target URL cannot be blank.
            too_long: Target URL cannot be longer than 2048 characters.
            invalid: Target URL must be a valid URL.
