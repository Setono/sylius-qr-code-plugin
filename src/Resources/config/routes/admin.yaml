# Base QR code resource: index (grid) + delete + a custom update that dispatches to the subtype route.
# The two subtype resources below each own create + update (the actual forms). Custom routes
# (stats, download) are declared explicitly at the bottom of this file.

setono_sylius_qr_code_admin_qr_code:
    resource: |
        alias: setono_sylius_qr_code.qr_code
        section: admin
        templates: "@SyliusAdmin\\Crud"
        redirect: index
        grid: setono_sylius_qr_code_admin_qr_code
        vars:
            all:
                subheader: setono_sylius_qr_code.ui.manage_qr_codes
            index:
                icon: qrcode
        except: ['create', 'show']
    type: sylius.resource

# The Sylius `@SyliusAdmin\Crud` template namespace does not ship a `show.html.twig`, so we
# can't rely on auto-registering `show` under the resource config (it would 500 looking for
# the missing template). Instead, keep `show` in the resource's `except:` list and declare it
# manually here, explicitly pointing _sylius.template at the plugin's template. Adopting apps
# can override by providing their own `@SetonoSyliusQRCodePlugin/admin/qr_code/show.html.twig`.
setono_sylius_qr_code_admin_qr_code_show:
    path: /qr-codes/{id}
    methods: [GET]
    defaults:
        _controller: setono_sylius_qr_code.controller.qr_code::showAction
        _sylius:
            section: admin
            template: "@SetonoSyliusQRCodePlugin/admin/qr_code/show.html.twig"
            vars:
                subheader: setono_sylius_qr_code.ui.manage_qr_codes
    requirements:
        id: '\d+'

setono_sylius_qr_code_admin_product_related_qr_code:
    resource: |
        alias: setono_sylius_qr_code.product_related_qr_code
        section: admin
        templates: "@SyliusAdmin\\Crud"
        only: ['create', 'update']
        vars:
            all:
                subheader: setono_sylius_qr_code.ui.product_qr_code
                # Sylius's default breadcrumb derives `{applicationName}.ui.{pluralName}` —
                # which becomes the untranslated `setono_sylius_qr_code.ui.product_related_qr_codes`
                # for this subtype. Override both the label and the link so the crumb reads
                # "QR codes" and navigates back to the unified grid rather than the subtype's
                # own index route (which just redirects to the grid anyway).
                breadcrumb: setono_sylius_qr_code.ui.qr_codes
                index:
                    route:
                        name: setono_sylius_qr_code_admin_qr_code_index
    type: sylius.resource

# After saving a subtype (create/update), Sylius's RedirectHandler looks up
# `{resource_name}_index`. Both subtypes only register create+update, so their `_index` doesn't
# exist — we alias it to a redirect that sends admins back to the unified base grid.
setono_sylius_qr_code_admin_product_related_qr_code_index:
    path: /product-related-qr-codes/
    controller: Symfony\Bundle\FrameworkBundle\Controller\RedirectController::redirectAction
    defaults:
        route: setono_sylius_qr_code_admin_qr_code_index
        permanent: false

setono_sylius_qr_code_admin_target_url_qr_code:
    resource: |
        alias: setono_sylius_qr_code.target_url_qr_code
        section: admin
        templates: "@SyliusAdmin\\Crud"
        only: ['create', 'update']
        vars:
            all:
                subheader: setono_sylius_qr_code.ui.url_qr_code
                breadcrumb: setono_sylius_qr_code.ui.qr_codes
                index:
                    route:
                        name: setono_sylius_qr_code_admin_qr_code_index
    type: sylius.resource

setono_sylius_qr_code_admin_target_url_qr_code_index:
    path: /target-url-qr-codes/
    controller: Symfony\Bundle\FrameworkBundle\Controller\RedirectController::redirectAction
    defaults:
        route: setono_sylius_qr_code_admin_qr_code_index
        permanent: false

# Custom admin routes. Controllers are implemented in later phases; the routes are declared here
# so the admin grid (which links to them) can render without a RouteNotFoundException.

setono_sylius_qr_code_admin_qr_code_stats:
    path: /qr-codes/{id}/stats
    controller: Setono\SyliusQRCodePlugin\Controller\StatsAction
    methods: [GET]
    requirements:
        id: '\d+'

setono_sylius_qr_code_admin_qr_code_download:
    path: /qr-codes/{id}/download/{format}/{channel}
    controller: Setono\SyliusQRCodePlugin\Controller\DownloadAction
    methods: [GET]
    defaults:
        format: png
        channel: ~
    requirements:
        id: '\d+'
        format: png|svg|pdf

