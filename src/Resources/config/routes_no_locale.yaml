# By default, Sylius uses urls like https://example.com/en_US/, but Sylius also offers the option to disable
# localized URLs (see https://docs.sylius.com/en/latest/cookbook/shop/disabling-localised-urls.html).
# To accommodate this in your plugin, provide a route file for non-localized stores and tell this in the README.md

setono_sylius_qr_code_shop:
    resource: "@SetonoSyliusQRCodePlugin/Resources/config/routes/shop.yaml"

# Global (non-localized, non-admin) routes. Houses the public /qr/{slug} redirect endpoint —
# QR codes are printed on physical artifacts, so the URL must work regardless of locale.
setono_sylius_qr_code_global:
    resource: "@SetonoSyliusQRCodePlugin/Resources/config/routes/global.yaml"

setono_sylius_qr_code_admin:
    resource: "@SetonoSyliusQRCodePlugin/Resources/config/routes/admin.yaml"
    prefix: /admin
